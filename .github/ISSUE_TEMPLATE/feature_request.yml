name: Feature Request
description: Suggest a new feature or enhancement
labels: ["type: feature", "status: triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve? (e.g. I'm frustrated when...)"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've considered
    validations:
      required: false

  - type: dropdown
    id: platform-relevance
    attributes:
      label: Platform relevance
      description: Which platforms does this feature apply to?
      multiple: true
      options:
        - All platforms
        - ESP32
        - AVR
        - Teensy
        - RP2040
        - STM32
        - WASM/Web
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: "Anything else \u2014 links, screenshots, references"
    validations:
      required: false
